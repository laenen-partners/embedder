version: "3"

# Environment is loaded via mise (see mise.toml).
# Fallback: dotenv for environments without mise.
dotenv: [".env"]

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  test:
    desc: Run all tests
    cmds:
      - go test -v -count=1 ./...

  test:cover:
    desc: Run tests with coverage summary
    cmds:
      - go test -coverprofile=coverage.out -count=1 ./...

  test:cover:html:
    desc: Generate HTML coverage report and open in browser
    cmds:
      - go test -coverprofile=coverage.out -count=1 ./...
      - go tool cover -html=coverage.out -o coverage.html
      - open coverage.html

  test:live:googleai:
    desc: Run Google AI live tests (requires GOOGLE_API_KEY)
    cmds:
      - go test -v -count=1 -run 'TestLive_GoogleAI' ./...

  test:live:openaicompat:
    desc: Run OpenAI-compatible live tests (requires OPENAI_COMPAT_URL and OPENAI_COMPAT_MODEL)
    cmds:
      - go test -v -count=1 -run 'TestLive_OpenAICompat' ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
